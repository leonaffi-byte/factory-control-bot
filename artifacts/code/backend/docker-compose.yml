version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - /home/factory/projects:/home/factory/projects
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/factory/.factory-env:/home/factory/.factory-env:ro
      - ./templates:/app/templates:ro
    network_mode: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: factory_bot
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/backup_db.sh:/usr/local/bin/backup_db.sh:ro
      - /home/factory/backups/db:/backups
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory -d factory_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
    driver: local
